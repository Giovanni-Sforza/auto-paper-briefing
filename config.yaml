# ============================================================
#  Auto-Paper-Briefing 配置文件 v3
# ============================================================

ai:
  base_url: "https://api.deepseek.com"
  # OpenAI:   https://api.openai.com/v1
  # DeepSeek: https://api.deepseek.com
  # 阿里云:    https://dashscope.aliyuncs.com/compatible-mode/v1
  # Ollama:   http://localhost:11434/v1
  api_key: ""            # 留空则读取环境变量 AI_API_KEY
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 2000

arxiv:
  # 关键词列表：
  #   普通字符串 → 会被关键词进化系统动态更新
  #   {query: "xxx", pin: true} → 固定，永不被替换
  queries:
    - "large language model reasoning"
    - "multimodal foundation model"
    - "reinforcement learning from human feedback"

  categories:
    - "cs.AI"
    - "cs.LG"
    - "cs.CL"

  max_results_per_query: 5
  days_lookback: 7

summary:
  dimensions:
    - "研究背景与动机：该研究试图解决什么问题？现有方法的局限性是什么？"
    - "核心方法与技术：论文提出了什么方法、模型或框架？关键技术点是什么？"
    - "实验设置：使用了哪些数据集？评测指标是什么？对比了哪些基线方法？"
    - "主要实验结论：在各项指标上取得了怎样的量化结果？"
    - "研究局限性：论文中明确指出了哪些局限性或未来工作方向？"

click_tracking:
  port: 19523

keyword_evolution:
  # 探索比例（防信息茧房）
  #   0.0 = 完全按兴趣收敛（有茧房风险）
  #   0.5 = 均衡（默认）：50% 精炼 + 50% 探索
  #   0.7 = 激进探索
  explore_ratio: 0.50
  total_queries: 8          # 进化后关键词总数（不含 pin 词）
  lookback_days: 30         # 分析近 N 天的点击记录
  min_signals_to_evolve: 3  # 有效信号总数不足时跳过

paths:
  temp_pdf_dir: "./temp_pdfs"
  history_file: "./history.json"
  output_dir:   "./reports"
  clicks_file:  "./clicks.json"   # 普通点击记录
  reactions_file: "./reactions.json"  # 赞/踩/评论记录
  seeds_file:   "./seeds.json"    # 手动添加的种子文章

performance:
  request_interval: 2
  max_retries: 3
  retry_delay: 5
  max_pdf_pages: 8
  max_text_chars: 8000
