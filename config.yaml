# ============================================================
#  Auto-Paper-Briefing 配置文件 v3
# ============================================================

ai:
  base_url: " https://api.deepseek.com"

  # 你的 API Key（强烈建议通过环境变量 AI_API_KEY 传入，此处留空时自动读取环境变量）
  api_key: ""
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 3000

arxiv:
  # 检索关键词列表（支持精确匹配和逻辑运算）
  queries:
    - "ultraperipheral heavy-ion collisions photoproduction"   # 精炼（点击/点赞/种子）
    - "point cloud self-supervised learning"   # 精炼（点击/点赞/种子）
    - "gluon saturation fluctuations"   # 精炼（点击/点赞/种子）
    - "quantum error correction distillation"   # 精炼（点击/点赞/种子）
    - "physics-informed neural networks PDE"   # 精炼（点击/点赞/种子）
    - "hadronic molecule photoproduction electron-ion collider"   # 探索（相邻领域）
    - "graph neural networks self-supervised molecular dynamics"   # 探索（相邻领域）
    - "initial state models Bayesian inference heavy-ion"   # 探索（相邻领域）
    - "bosonic codes concatenated quantum convolutional codes"   # 探索（相邻领域）
    - "operator learning neural integral equations"   # 探索（相邻领域）
    
    # --- 物理学：量子与原子光学 (针对量子计算与激光) ---
    - "quant-ph"        # Quantum Physics (量子物理，涵盖量子计算核心)



  categories:
    - "nucl-th"         # Nuclear Theory (核理论，核结构与高能核物理的核心)
    - "nucl-ex"         # Nuclear Experiment (核实验)
    - "hep-ph"
    # --- 物理学：高能物理 ---
    - "hep-ph"          # High Energy Physics - Phenomenology (高能物理现象学)
    - "hep-ex"          # High Energy Physics - Experiment (高能物理实验)
    - "hep-th"          # High Energy Physics - Theory (高能物理理论)
    
    # --- 物理学：量子与原子光学 (针对量子计算与激光) ---
    - "quant-ph"        # Quantum Physics (量子物理，涵盖量子计算核心)
    - "physics.atom-ph" # Atomic Physics (原子物理，常涉及激光与原子核的相互作用)
    - "physics.optics"  # Optics (光学，包含强激光场研究)
    
    # --- 计算机科学：深度学习 ---
    - "cs.LG"           # Machine Learning (CS类机器学习)
    - "cs.AI"           # Artificial Intelligence (人工智能)
    - "stat.ML"         # Machine Learning (统计类机器学习，很多硬核DL理论发在这里)

  max_results_per_query: 10
  days_lookback: 600        # 仅获取最近 N 天的论文，0 表示不限


summary:
  dimensions:
    - "研究背景与核心动机：该研究试图解决什么关键物理现象或计算瓶颈？现有理论模型、实验手段或算法架构存在什么局限性？"
    - "核心理论、模型与技术方案：论文提出了什么新的理论框架（如有效场论）、实验机制（如特定的激光-原子核相互作用）、或算法架构（如新型神经网络/量子线路）？关键创新点是什么？"
    - "实验装置、模拟环境与数据基础：该研究依赖怎样的验证条件？（若是物理研究：使用了什么加速器、激光设施、探测器或蒙特卡洛模拟软件？若是算法研究：使用了什么数据集、基准测试或量子硬件？）"
    - "核心观测结果与量化表现：实验或推导得出了什么关键结论？（例如：观测到了什么新的能级/截面/相变现象？或者在模型精度、量子纠错率等指标上取得了怎样的量化突破？）"
    - "误差分析、局限性与物理意义：论文明确指出了哪些理论近似误差、实验系统误差或算法局限性？该工作对所在领域（如完善核力模型或提升AI推理能力）有什么实质性的物理/理论意义？"

click_tracking:
  port: 19523

keyword_evolution:
  # 探索比例（防信息茧房）
  #   0.0 = 完全按兴趣收敛（有茧房风险）
  #   0.5 = 均衡（默认）：50% 精炼 + 50% 探索
  #   0.7 = 激进探索
  explore_ratio: 0.50
  total_queries: 10          # 进化后关键词总数（不含 pin 词）
  lookback_days: 30         # 分析近 N 天的点击记录
  min_signals_to_evolve: 3  # 有效信号总数不足时跳过

paths:
  temp_pdf_dir: "./temp_pdfs"
  history_file: "./history.json"
  output_dir:   "./reports"
  clicks_file:  "./clicks.json"   # 普通点击记录
  likes_file:   "./likes.json"    # 点赞记录（仅点赞）
  seeds_file:   "./seeds.json"    # 手动添加的种子文章

performance:
  request_interval: 2
  max_retries: 3
  retry_delay: 5
  max_pdf_pages: 8
  max_text_chars: 8000
