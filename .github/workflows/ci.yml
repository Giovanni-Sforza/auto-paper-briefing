name: CI Tests

on:
  push:
    branches: [ main, master, dev ]
    paths:
      - '**.py'
      - 'requirements.txt'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python: [ '3.11', '3.12' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
          # PyMuPDF 安装失败时不中断测试（降级可用）
          pip install PyMuPDF || echo "PyMuPDF unavailable, fallback will be used"

      - name: Syntax check – all modules
        shell: bash
        run: |
          python -m py_compile main.py
          python -m py_compile setup.py
          python -m py_compile migrate_likes.py
          for f in modules/*.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done

      - name: Run unit tests
        shell: bash
        run: python -m pytest tests/ -v --tb=short 2>/dev/null || python run_tests.py

      # 如果没有 pytest，用内置测试脚本
      - name: Run built-in tests (fallback)
        if: failure()
        shell: bash
        run: python run_tests.py
